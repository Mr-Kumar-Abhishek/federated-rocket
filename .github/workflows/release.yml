name: Release

on:
  push:
    tags:
      - 'v*'  # Push events matching v1.0, v1.0.0, etc.

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Federated Rocket ${{ github.ref_name }}
          body: |
            ## Federated Rocket ${{ github.ref_name }}
            
            ### What's New
            - See the [CHANGELOG](CHANGELOG.md) for details
            
            ### Downloads
            - Windows (x86_64): `federated-rocket-x86_64-pc-windows-msvc`
            - Linux (x86_64): `federated-rocket-x86_64-unknown-linux-gnu`
            - macOS (x86_64): `federated-rocket-x86_64-apple-darwin`
            
            ### Installation
            Extract the archive and run `./federated-rocket` or `./federated-rocket-gui`
          draft: false
          prerelease: false

  build-release:
    name: Build Release Assets
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            archive_ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            archive_ext: .zip
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            archive_ext: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build release
        run: cargo build --release --workspace --verbose
      
      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p federated-rocket-${{ matrix.target }}
          cp target/release/federated-rocket${{ matrix.suffix }} federated-rocket-${{ matrix.target }}/
          cp target/release/federated-rocket-gui${{ matrix.suffix }} federated-rocket-${{ matrix.target }}/
          cp README.md LICENSE federated-rocket-${{ matrix.target }}/
          tar czvf federated-rocket-${{ matrix.target }}.tar.gz federated-rocket-${{ matrix.target }}/
      
      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir federated-rocket-${{ matrix.target }}
          copy target\release\federated-rocket.exe federated-rocket-${{ matrix.target }}/
          copy target\release\federated-rocket-gui.exe federated-rocket-${{ matrix.target }}/
          copy README.md federated-rocket-${{ matrix.target }}/
          Compress-Archive -Path federated-rocket-${{ matrix.target }} -DestinationPath federated-rocket-${{ matrix.target }}.zip
      
      - name: Upload release asset (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./federated-rocket-${{ matrix.target }}.tar.gz
          asset_name: federated-rocket-${{ matrix.target }}.tar.gz
          asset_content_type: application/gzip
      
      - name: Upload release asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./federated-rocket-${{ matrix.target }}.zip
          asset_name: federated-rocket-${{ matrix.target }}.zip
          asset_content_type: application/zip